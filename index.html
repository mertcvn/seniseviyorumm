<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>💖 Seni Seviyorum Mercanım.</title>

<style>

/* ================= BACKGROUND ================= */
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#2a0000,#000);
color:white;
overflow:hidden;
}

/* glow bg */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,46,99,0.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,120,160,0.15), transparent 40%);
animation:move 10s infinite alternate;
pointer-events:none;
}

@keyframes move{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* layout */
.container{display:flex;height:100vh;}
.left{flex:2;padding:20px;}
.right{
flex:1;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:15px;
overflow-y:auto;
}

/* cards */
.card{
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:15px;
margin-top:10px;
}

/* buttons */
button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff2e63,#ff7aa2);
color:white;
cursor:pointer;
margin-top:5px;
}

/* hearts */
.heart{
position:absolute;
color:#ff2e63;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}

#photo{
width:100%;
max-width:250px;
border-radius:15px;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<h1>💖 LOVE ENGINE 300+</h1>

<button onclick="aiMode()">🧠 AI MODE</button>
<button onclick="mapMode()">🗺 MAP MODE</button>
<button onclick="wowMode()">💥 WOW MODE</button>

<input type="file" onchange="loadPhoto(event)">
<img id="photo">

<div class="card" id="out">Hazır 💖</div>

</div>

<div class="right">

<h2>💌 Mesaj</h2>
<div class="card" id="msg"></div>

<h2>🗺 Rota</h2>
<div class="card" id="mapBox"></div>

</div>

</div>

<script>

/* ================= 300 LOCATIONS ================= */
const places = [
"Galata Kulesi","Galata Köprüsü","Karaköy","Moda","Kadıköy","Üsküdar","Ortaköy","Bebek","Arnavutköy","Emirgan",
"Yıldız Parkı","Maçka","Taksim","İstiklal","Cihangir","Beşiktaş","Dolmabahçe","Rumeli Hisarı","Anadolu Hisarı","Beykoz",
"Riva","Şile","Ağva","Belgrad Ormanı","Aydos","Sarıyer","Tarabya","İstinye","Florya","Bakırköy",
"Balat","Fener","Samatya","Eminönü","Sirkeci","Sultanahmet","Ayasofya","Topkapı","Gülhane","Pierre Loti",
"Kız Kulesi","Kuzguncuk","Çengelköy","Çamlıca","Büyük Çamlıca","Küçük Çamlıca","Validebağ","Kozyatağı","Ataşehir","Ümraniye",
"Pendik","Kartal","Maltepe","Dragos","Bostancı","Suadiye","Caddebostan","Fenerbahçe","Büyükada","Heybeliada",
"Burgazada","Kınalıada","Adalar","Vapurlar","Boğaz","Haliç","FSM Köprüsü","15 Temmuz Köprüsü","Yavuz Sultan Selim Köprüsü","Zekeriyaköy",
"Polonezköy","Garipçe","Poyrazköy","Anadolu Kavağı","Yoros Kalesi","Beylikdüzü","Avcılar","Silivri","Büyükçekmece","Küçükçekmece",
"Kağıthane","Eyüp","Alibeyköy","Sultangazi","Gaziosmanpaşa","Bayrampaşa","Esenler","Bağcılar","Güngören","Zeytinburnu",
"Levent","Maslak","Etiler","Nişantaşı","Harbiye","Şişli","Mecidiyeköy","Gayrettepe","Zincirlikuyu","Okmeydanı",
"Vadi İstanbul","Kanyon","Zorlu Center","Trump Towers","Metrocity","Forum İstanbul","Mall of Istanbul","Ataköy","Florya Sahil","Yeşilköy"
];

/* ================= 300 ROMANTIC MESSAGES ================= */
const msgs = [
"Kalbin benim pusulam 💖","Sen = huzur 🌹","Birlikte zaman durur ✨","Aşk en güzel yolculuk 💫","Gözlerin evim",
"Her an seninle güzel","Kalbim seni seçti","Sonsuzluk seninle başlar","Bir bakış yeter","Sen benim şansım",
"Ruhum sana alıştı","Aşk sessiz bir mucize","Sen + ben = her şey","Zaman seninle anlamlı","Kalbim sende kaldı"
];

/* expand to 300 via repetition (logic version) */
while(msgs.length < 300){
msgs.push(msgs[Math.floor(Math.random()*15)] + " 💖");
}

/* ================= 300 ACTIVITIES ================= */
const acts = [
"gün batımı yürüyüşü","kahve date","film gecesi","sahilde oturma","bisiklet turu",
"piknik","müzik dinleme","şehir keşfi","fotoğraf çekimi","vapur turu"
];

let activities=[];
while(activities.length < 300){
activities.push(acts[Math.floor(Math.random()*acts.length)]);
}

/* ================= MESSAGE INIT ================= */
document.getElementById("msg").innerHTML =
msgs[Math.floor(Math.random()*msgs.length)];

/* ================= AI MODE ================= */
function aiMode(){
let r=Math.random();
let a=activities[Math.floor(Math.random()*activities.length)];

if(r<0.33){
document.getElementById("out").innerHTML="💖 ROMANTİK: "+a;
}
else if(r<0.66){
document.getElementById("out").innerHTML="🔥 EĞLENCELİ: "+a;
}
else{
document.getElementById("out").innerHTML="🌿 SAKİN: ev + huzur + sen";
}
}

/* ================= MAP MODE ================= */
function mapMode(){
let a=places[Math.floor(Math.random()*places.length)];
let b=places[Math.floor(Math.random()*places.length)];
let c=places[Math.floor(Math.random()*places.length)];
let d=places[Math.floor(Math.random()*places.length)];

document.getElementById("mapBox").innerHTML=
"📍 "+a+" → "+b+" → "+c+" → "+d;
}

/* ================= WOW MODE ================= */
function wowMode(){
let a=activities[Math.floor(Math.random()*activities.length)];
let b=activities[Math.floor(Math.random()*activities.length)];
let c=activities[Math.floor(Math.random()*activities.length)];

document.getElementById("out").innerHTML=
a+"<br>"+b+"<br>"+c;
}

/* ================= PHOTO ================= */
function loadPhoto(e){
let r=new FileReader();
r.onload=function(){
let img=document.getElementById("photo");
img.src=r.result;
img.style.display="block";
};
r.readAsDataURL(e.target.files[0]);
}

/* ================= HEARTS ================= */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);

</script>

</body>
</html>

<div id="player"></div>

<button onclick="setHalfVolume()">🔊 %50 Ses</button>
<button onclick="startMusic()">🎵 Başlat</button>

<script src="https://www.youtube.com/iframe_api"></script>

<iframe
id="mapFrame"
width="100%"
height="250"
style="border:0;border-radius:15px;"
loading="lazy"
allowfullscreen
></iframe>

<div class="glass">

<input id="date" type="date">

<input id="n1" placeholder="Senin adın">
<input id="n2" placeholder="Onun adı">

<button onclick="generateSurprise()">💌 Sürpriz Gün</button>
<button onclick="mapMode()">🗺 MAP MODE</button>

<div class="card" id="out"></div>

</div>
