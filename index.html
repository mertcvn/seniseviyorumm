<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Love Planner 💖</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1a0000,#330000,#1a0000);
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.left{
flex:2;
padding:30px;
position:relative;
}

.right{
flex:1;
background:rgba(0,0,0,0.4);
padding:20px;
overflow-y:auto;
border-left:2px solid #ff3b6b;
}

h1{
color:#ff3b6b;
text-shadow:0 0 10px #ff3b6b;
}

button{
background:#ff2e63;
border:none;
padding:10px 15px;
color:white;
cursor:pointer;
border-radius:10px;
box-shadow:0 0 10px #ff2e63;
margin-top:10px;
}

button:hover{
transform:scale(1.05);
}

input{
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(255,0,100,0.3);
}

.heart{
position:absolute;
color:#ff2e63;
animation:float 6s infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h1>💖 Love Date Planner</h1>

<input type="date" id="date">

<br>

<button ondblclick="generate()">Günlük Sürpriz Plan Oluştur 💌</button>

<button onclick="toggleMusic()">🎵 Müzik Aç/Kapat</button>

<div class="card" id="output"></div>

<!-- YouTube Music -->
<iframe id="yt" width="0" height="0"
src="https://www.youtube.com/embed/kJQP7kiw5Fk?enablejsapi=1"
allow="autoplay"></iframe>

</div>

<div class="right">
<h2>📅 Plan Geçmişi</h2>
<div id="log"></div>
</div>

</div>

<script>
const activities = [
"Deniz kenarında yürüyüş",
"Birlikte kahve yapma",
"Gece yıldız izleme",
"Birlikte yemek pişirme",
"Sinema gecesi",
"Piknik yapma",
"Fotoğraf çekimi",
"Karaoke gecesi",
"Müze gezisi",
"Bisiklet turu",
"Kitap okuma saati",
"Birlikte resim yapma",
"Kumsalda oturma",
"Şehir keşfi",
"Yemek yarışması",
"Film maratonu",
"Mektup yazma",
"El ele yürüyüş",
"Kamp yapma planı",
"Evde spa günü"
];

// 300 yapmak için çoğalt
while(activities.length < 300){
activities.push(activities[Math.floor(Math.random()*20)] + " 💕");
}

function generate(){
let date = document.getElementById("date").value;
if(!date){alert("Tarih seç!"); return;}

let a1 = activities[Math.floor(Math.random()*activities.length)];
let a2 = activities[Math.floor(Math.random()*activities.length)];

document.getElementById("output").innerHTML =
`<h3>${date} için sürprizler 💖</h3>
<p>1️⃣ ${a1}</p>
<p>2️⃣ ${a2}</p>`;

let log = document.getElementById("log");
log.innerHTML += `<div class='card'><b>${date}</b><br>${a1}<br>${a2}</div>`;
}

let music = true;

function toggleMusic(){
let yt = document.getElementById("yt");
if(music){
yt.src = "";
music = false;
}else{
yt.src = "https://www.youtube.com/embed/kJQP7kiw5Fk?enablejsapi=1";
music = true;
}
}

// floating hearts
setInterval(()=>{
let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},500);
</script>

</body>
</html>
