<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sürpriz Gün 💖</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: radial-gradient(circle at top, #2a0000, #0a0a0a);
    color: white;
}

.page {
    display: none;
    min-height: 100vh;
}

.active {
    display: block;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    color: #ff2e63;
    text-shadow: 0 0 20px rgba(255,46,99,0.6);
}

input {
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin: 10px;
}

button {
    background: linear-gradient(135deg, #ff2e63, #ff4d6d);
    border: none;
    padding: 14px 24px;
    color: white;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.card {
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,46,99,0.3);
    border-radius: 16px;
    backdrop-filter: blur(10px);
}

li {
    list-style: none;
    padding: 14px;
    margin: 10px 0;
    background: rgba(255,46,99,0.08);
    border-left: 4px solid #ff2e63;
    border-radius: 10px;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
    <div class="center">
        <h1>💖 Sürpriz Gün 💖</h1>
        <p>Bir tarih seç, sadece 2 özel an gelsin</p>

        <input type="date" id="date">
        <button onclick="generate()">Sürprizi Gör</button>
    </div>
</div>

<!-- RESULT -->
<div id="result" class="page">
    <div class="card">

        <h1>💖 Senin 2 Özel Anın</h1>
        <p id="dateText"></p>

        <ul id="list"></ul>

        <div style="text-align:center;">
            <button onclick="back()">Geri</button>
        </div>

    </div>
</div>

<script>

/* AKTİVİTE HAVUZU */
const activities = [
"El ele sahilde gün batımı yürüyüşü",
"Kahve içip uzun sohbet etmek",
"Piknik yapıp birlikte müzik dinlemek",
"Şehirde kaybolarak keşif yapmak",
"Fotoğraf çekip anı biriktirmek",
"Dondurma alıp parkta oturmak",
"Yıldızlara bakarak hayal kurmak",
"Birlikte yemek yapmaya çalışmak",
"Sessizce sarılıp oturmak",
"Gece yürüyüşüne çıkmak"
];

/* BASİT SEED (TARİHE GÖRE SABİT SEÇİM) */
function seedFromDate(str){
    let sum = 0;
    for(let i=0;i<str.length;i++){
        sum += str.charCodeAt(i);
    }
    return sum;
}

function generate(){

    const date = document.getElementById("date").value;

    if(!date){
        alert("Bir tarih seç 💖");
        return;
    }

    document.getElementById("home").classList.remove("active");
    document.getElementById("result").classList.add("active");

    document.getElementById("dateText").innerText = "📅 " + date;

    const list = document.getElementById("list");
    list.innerHTML = "";

    let seed = seedFromDate(date);

    // deterministic 2 seçim
    let first = activities[seed % activities.length];
    let second = activities[(seed * 7) % activities.length];

    // aynı çıkarsa değiştir
    if(first === second){
        second = activities[(seed + 3) % activities.length];
    }

    let li1 = document.createElement("li");
    li1.innerText = "💖 " + first;

    let li2 = document.createElement("li");
    li2.innerText = "💖 " + second;

    list.appendChild(li1);
    list.appendChild(li2);
}

function back(){
    document.getElementById("result").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
