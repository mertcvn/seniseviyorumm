<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>💖 Ultra Love Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:radial-gradient(circle at top,#2a0000,#000);
color:white;
overflow:hidden;
}

/* animated background glow */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,46,99,0.2), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,120,160,0.15), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(255,0,80,0.1), transparent 50%);
animation: bgMove 10s infinite alternate;
pointer-events:none;
}

@keyframes bgMove{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* ================= LAYOUT ================= */
.container{
display:flex;
height:100vh;
}

.left{
flex:2;
padding:30px;
}

.right{
flex:1;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-left:1px solid rgba(255,255,255,0.1);
padding:20px;
overflow-y:auto;
}

/* ================= TEXT ================= */
h1{
font-family:'Playfair Display';
font-size:42px;
color:#ff3b6b;
text-shadow:0 0 25px #ff3b6b;
}

/* ================= UI ================= */
input,button{
padding:12px;
border:none;
border-radius:12px;
margin-top:8px;
}

input{
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

button{
background:linear-gradient(135deg,#ff2e63,#ff7aa2);
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff2e63;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* ================= CARDS ================= */
.card{
background:rgba(255,255,255,0.06);
padding:12px;
margin-top:10px;
border-radius:16px;
box-shadow:0 0 25px rgba(255,0,100,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* ================= GLASS ================= */
.glass{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
backdrop-filter:blur(15px);
margin-top:10px;
}

/* ================= HEARTS ================= */
.heart{
position:absolute;
color:#ff2e63;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}

/* ================= PHOTO ================= */
#photo{
width:100%;
max-width:320px;
border-radius:15px;
margin-top:10px;
box-shadow:0 0 25px #ff2e63;
display:none;
}

/* ================= MUSIC ================= */
.music{
position:absolute;
bottom:20px;
left:20px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:15px;
backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">

<h1>💖 Ultra Love Engine</h1>

<div class="glass">

<input id="date" type="date"><br>

<input id="n1" placeholder="Senin adın">
<input id="n2" placeholder="Onun adı">

<br>

<button onclick="aiMode()">🧠 AI MODE</button>
<button onclick="mapMode()">🗺 MAP MODE</button>
<button onclick="wowMode()">💥 WOW MODE</button>

<br>

<input type="file" accept="image/*" onchange="loadPhoto(event)">
<img id="photo">

<div class="card" id="out">Hazır 💖</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<h2>💌 Mesaj</h2>
<div class="card" id="msg"></div>

<h2>📍 Rota</h2>
<div class="card" id="mapBox">Hazır</div>

<h2>🎵 Music</h2>
<iframe width="100%" height="150"
src="https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1"
allow="autoplay"></iframe>

</div>

</div>

<!-- MUSIC FLOAT -->
<div class="music">🎵 Love Music</div>

<script>

/* ================= 300 ACTIVITIES ================= */
const base = [
"Galata Kulesi","Moda sahil","Karaköy","Üsküdar","Ortaköy","Bebek",
"Emirgan","Balat","Kadıköy","Taksim","Cihangir","Beşiktaş",
"Çamlıca","Kız Kulesi","Kuzguncuk","Çengelköy","Belgrad Ormanı",
"Aydos Ormanı","Beykoz","Riva","Şile","Ağva"
];

let acts=[];
while(acts.length<300){
acts.push(base[Math.floor(Math.random()*base.length)]);
}

/* ================= MESSAGES ================= */
const msgs=[
"💖 Bugün aşk biraz daha güçlü",
"🌹 Kalpler aynı ritimde",
"✨ Birlikte her şey daha güzel",
"💫 Sen + O = sonsuz"
];

document.getElementById("msg").innerHTML =
msgs[Math.floor(Math.random()*msgs.length)];

/* ================= AI MODE ================= */
function aiMode(){
let r=Math.random();

if(r<0.33){
document.getElementById("out").innerHTML="💖 Romantik: "+acts[0];
}else if(r<0.66){
document.getElementById("out").innerHTML="🔥 Eğlenceli: "+acts[1];
}else{
document.getElementById("out").innerHTML="🌿 Sakin: ev + film + kahve";
}
}

/* ================= MAP MODE ================= */
const places = [
"Galata","Moda","Üsküdar","Ortaköy","Bebek","Karaköy",
"Balat","Kadıköy","Çamlıca","Kız Kulesi","Beykoz","Şile"
];

function mapMode(){
let a=places[Math.floor(Math.random()*places.length)];
let b=places[Math.floor(Math.random()*places.length)];
let c=places[Math.floor(Math.random()*places.length)];

document.getElementById("mapBox").innerHTML =
`📍 ${a} → ${b} → ${c}`;
}

/* ================= WOW MODE ================= */
function wowMode(){
document.getElementById("out").innerHTML =
acts[0]+"<br>"+acts[1]+"<br>"+acts[2];
}

/* ================= PHOTO ================= */
function loadPhoto(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){
document.getElementById("photo").src=reader.result;
document.getElementById("photo").style.display="block";
};

reader.readAsDataURL(file);
}

/* ================= HEARTS ================= */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);

</script>

</body>
</html>
