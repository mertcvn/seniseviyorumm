<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💖 Aşk Dolu Aktiviteler | 300 Fikir</title>
    <!-- Google Fonts: Modern & Romantik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 ikonlar için -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #ffeef8 0%, #ffe0f0 40%, #ffd9d9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Arka planda uçuşan minik kalpler */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            color: rgba(220, 20, 60, 0.15);
            font-size: 24px;
            animation: floatHeart 8s infinite ease-in-out;
            bottom: -50px;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.8);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-120vh) rotate(20deg) scale(1.2);
                opacity: 0.1;
            }
            100% {
                transform: translateY(-200vh) rotate(-10deg) scale(0.6);
                opacity: 0;
            }
        }

        .main-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 750px;
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(20px);
            background: linear-gradient(135deg, rgba(255, 240, 245, 0.9) 0%, rgba(255, 220, 230, 0.95) 100%);
            border-radius: 48px;
            padding: 30px 25px 35px;
            box-shadow: 0 30px 50px rgba(180, 60, 80, 0.25), 0 10px 25px rgba(200, 80, 100, 0.2), inset 0 2px 10px rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: all 0.3s ease;
        }

        /* Başlık */
        .title-section {
            text-align: center;
        }
        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            font-weight: 700;
            color: #c41e3a;
            text-shadow: 2px 2px 10px rgba(220, 20, 60, 0.3);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .title i {
            color: #e63946;
            font-size: 2.8rem;
            animation: heartbeat 1.2s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            50% { transform: scale(1); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .subtitle {
            font-weight: 300;
            color: #b3445c;
            margin-top: 5px;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* Tarih ve Buton Alanı */
        .date-surprise-box {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 20px 22px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 18px;
            box-shadow: 0 10px 20px rgba(200, 70, 100, 0.15);
            border: 1px solid rgba(255, 220, 220, 0.8);
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 22px;
            border-radius: 50px;
            box-shadow: 0 4px 12px rgba(200, 50, 70, 0.2);
            border: 1px solid #ffb3c6;
            flex: 1 1 auto;
            justify-content: center;
        }
        .date-picker i {
            color: #c41e3a;
            font-size: 1.5rem;
        }
        .date-picker input {
            border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #5e2c3a;
            background: transparent;
            outline: none;
            width: 100%;
            cursor: pointer;
        }

        .surprise-btn {
            background: linear-gradient(135deg, #e63946, #c41e3a);
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(220, 20, 60, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 0.8px;
            white-space: nowrap;
        }
        .surprise-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 25px rgba(200, 30, 50, 0.6);
            background: linear-gradient(135deg, #f04c5a, #d62839);
        }
        .surprise-btn i {
            font-size: 1.3rem;
        }

        /* Aktiviteler kutuları */
        .activities-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 5px;
        }
        .activity-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .activity-card {
            flex: 1 1 180px;
            background: rgba(255, 248, 250, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 18px 14px;
            box-shadow: 0 15px 25px rgba(160, 50, 70, 0.15);
            border: 1px solid rgba(255, 200, 210, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            transition: 0.2s;
        }
        .activity-card i {
            font-size: 2.2rem;
            color: #d6336c;
            background: #ffe3ec;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 5px 12px rgba(220, 20, 60, 0.2);
        }
        .activity-label {
            font-weight: 600;
            color: #b03052;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .activity-text {
            font-weight: 500;
            color: #3e1e2a;
            font-size: 0.95rem;
            word-break: break-word;
            min-height: 45px;
        }

        /* İstanbul Rota kutusu */
        .istanbul-box {
            background: rgba(255, 242, 245, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 20px;
            border: 1px solid #fbb1c3;
            box-shadow: 0 10px 18px rgba(190, 60, 80, 0.2);
        }
        .istanbul-title {
            font-weight: 600;
            color: #b33c5a;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 1.1rem;
        }
        .route-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
        }
        .route-item {
            background: white;
            border-radius: 20px;
            padding: 12px 14px;
            flex: 1 1 140px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: #4a202b;
            box-shadow: 0 5px 10px rgba(200, 70, 100, 0.15);
            border: 1px solid #fbc1d0;
            font-size: 0.9rem;
        }
        .route-item i {
            color: #c41e3a;
            font-size: 1.2rem;
        }

        /* Youtube müzik */
        .music-player {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #f7b0c0;
            flex-wrap: wrap;
        }
        .music-player i {
            color: #c41e3a;
            font-size: 1.8rem;
        }
        .music-player iframe {
            border-radius: 20px;
            height: 60px;
            flex: 1 1 250px;
            border: none;
        }

        @media (max-width: 500px) {
            .main-card {
                padding: 20px 16px;
            }
            .title {
                font-size: 2.4rem;
            }
        }
    </style>
</head>
<body>
<!-- Uçuşan kalpler arka plan -->
<div class="hearts-bg" id="heartsContainer"></div>

<div class="main-card">
    <div class="title-section">
        <h1 class="title">
            <i class="fas fa-heart"></i> Aşk Dolu Anlar <i class="fas fa-heart"></i>
        </h1>
        <p class="subtitle">300 aktivite • romantik • eğlenceli • anı</p>
    </div>

    <!-- Tarih seçme ve sürpriz butonu -->
    <div class="date-surprise-box">
        <div class="date-picker">
            <i class="fas fa-calendar-alt"></i>
            <input type="date" id="bulusmaTarihi" value="">
        </div>
        <button class="surprise-btn" id="surpriseBtn">
            <i class="fas fa-gift"></i> Sürpriz Yap
        </button>
    </div>

    <!-- 3 aktivite kartı: Romantik, Eğlenceli, Anı -->
    <div class="activities-grid" id="activityContainer">
        <div class="activity-row">
            <div class="activity-card">
                <i class="fas fa-kiss-wink-heart"></i>
                <span class="activity-label">Romantik</span>
                <span class="activity-text" id="romantikActivity">🌹 Boğaz'da gün batımı</span>
            </div>
            <div class="activity-card">
                <i class="fas fa-laugh-squint"></i>
                <span class="activity-label">Eğlenceli</span>
                <span class="activity-text" id="eglenceliActivity">🎲 Komedi kulübü</span>
            </div>
            <div class="activity-card">
                <i class="fas fa-camera-retro"></i>
                <span class="activity-label">Anı Biriktirme</span>
                <span class="activity-text" id="aniActivity">📸 Fotoğraf köşesi</span>
            </div>
        </div>
    </div>

    <!-- İstanbul rotası (3 birbirine yakın yer) -->
    <div class="istanbul-box">
        <div class="istanbul-title">
            <i class="fas fa-map-pin"></i> İstanbul'da Bugünün Rotaları
        </div>
        <div class="route-list" id="routeContainer">
            <div class="route-item"><i class="fas fa-landmark"></i> Galata Kulesi</div>
            <div class="route-item"><i class="fas fa-coffee"></i> Karaköy Kahve</div>
            <div class="route-item"><i class="fas fa-bridge"></i> Galata Köprüsü</div>
        </div>
    </div>

    <!-- YouTube Müzik Çalar (romantik lo-fi / aşk şarkıları) -->
    <div class="music-player">
        <i class="fab fa-youtube"></i>
        <iframe src="https://www.youtube.com/embed/2fng0HWG5VA?autoplay=0&mute=0&controls=1&modestbranding=1&loop=1&playlist=2fng0HWG5VA"
                title="Romantik müzik" allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>
</div>

<script>
    (function() {
        // ---------- AKTİVİTE HAVUZU (300'den fazla kombinasyon hissi veren dinamik listeler) ----------
        const romantikAktiviteler = [
            "🌅 Boğaz kenarında el ele yürüyüş", "🕯️ Mum ışığında ev yemeği", "💃 Aşk temalı dans gecesi",
            "🎻 Canlı klasik müzik dinletisi", "🍷 Çatı katında şarap tadımı", "🌹 Gizli bahçede piknik",
            "🛁 Köpük banyosu ve masaj", "📖 Aşk mektubu okuma", "🎬 Romantik film maratonu",
            "🌌 Yıldız altında kamp", "🎈 Sıcak hava balonu (simülasyon)", "🍫 Çikolata fondü",
            "💌 El yapımı hediye atölyesi", "🎶 Birlikte çalma listesi yapma", "🧖‍♀️ Spa keyfi"
        ];

        const eglenceliAktiviteler = [
            "🎤 Karaoke düellosu", "🎮 Retro oyun salonu", "🍔 Sokak lezzetleri turu",
            "🎢 Luna park eğlencesi", "🎲 Masa oyunları kafe", "🤹 Sokak performansı izleme",
            "🍦 Dondurma tadım yarışı", "🎯 Okçuluk / dart", "🎨 Komik portre çizimi",
            "🚲 Tandem bisiklet", "🎭 Doğaçlama tiyatro", "🎳 Bowling & lazer tag",
            "🧩 Kaçış odası", "🍿 Komedi film gecesi", "🎪 Sokak festivali"
        ];

        const aniAktiviteler = [
            "📸 Polaroid fotoğraf avı", "📔 Ortak günlük yazma", "🎨 Seramik boyama",
            "🧵 Birlikte örgü/ bileklik", "🎬 Kısa film çekimi", "🖼️ Kolaj tablo yapımı",
            "💿 Mix CD / playlist kapağı", "🗺️ Gelecek haritası çizme", "📮 Zaman kapsülü gömme",
            "🎭 Gölge oyunu kaydetme", "🧁 Kek süsleme yarışı", "🎈 Mesaj balonu bırakma",
            "📱 Komik TikTok çekimi", "🖌️ Tuval boyama", "🎵 Birlikte şarkı besteleme"
        ];

        // İstanbul rotaları (birbirine yakın 3'lü setler)
        const istanbulRotalari = [
            ["🏛️ Galata Kulesi", "☕ Karaköy Kahveciler", "🌉 Galata Köprüsü"],
            ["🌸 Emirgan Korusu", "🍵 Çınaraltı Çay", "🏞️ Baltalimanı Japon Bahçesi"],
            ["🕌 Sultanahmet", "🍦 Dondurmacı Ali Usta", "🛍️ Arasta Çarşısı"],
            ["🎨 Moda Sahili", "🍪 Kadıköy Tatlıcılar", "🎭 Barış Manço Müzesi"],
            ["🌳 Maçka Parkı", "🚡 Teleferik", "🍔 Nişantaşı Burger"],
            ["🏰 Rumeli Hisarı", "🍳 Bebek Kahvaltı", "🚤 Bebek İskelesi"],
            ["🌇 Kız Kulesi manzarası", "🥗 Üsküdar Balıkçı", "🕌 Mihrimah Sultan"],
            ["🎡 Vialand tema park", "🍿 Eyüp Oyuncakçı", "☕ Pierre Loti"],
        ];

        // DOM elementleri
        const tarihInput = document.getElementById('bulusmaTarihi');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const romantikEl = document.getElementById('romantikActivity');
        const eglenceliEl = document.getElementById('eglenceliActivity');
        const aniEl = document.getElementById('aniActivity');
        const routeContainer = document.getElementById('routeContainer');

        // Bugünün tarihini varsayılan olarak ayarla
        const today = new Date().toISOString().slice(0, 10);
        tarihInput.value = today;

        // Rastgele seçim fonksiyonu
        function rastgeleDiziEleman(dizi) {
            return dizi[Math.floor(Math.random() * dizi.length)];
        }

        // Aktiviteleri güncelle
        function aktiviteleriGuncelle() {
            romantikEl.textContent = rastgeleDiziEleman(romantikAktiviteler);
            eglenceliEl.textContent = rastgeleDiziEleman(eglenceliAktiviteler);
            aniEl.textContent = rastgeleDiziEleman(aniAktiviteler);
        }

        // İstanbul rotasını güncelle (3'lü set)
        function rotaGuncelle() {
            const secilenSet = rastgeleDiziEleman(istanbulRotalari);
            routeContainer.innerHTML = '';
            secilenSet.forEach(yer => {
                const div = document.createElement('div');
                div.className = 'route-item';
                div.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${yer}`;
                routeContainer.appendChild(div);
            });
        }

        // Ana sürpriz fonksiyonu
        function surprizYap() {
            // Tarih kontrolü (opsiyonel bilgi)
            const secilenTarih = tarihInput.value;
            if (!secilenTarih) {
                alert('💕 Lütfen buluşma tarihini seç tatlım!');
                return;
            }
            // Animasyon hissi için buton minik efekt
            surpriseBtn.style.transform = 'scale(0.95)';
            setTimeout(() => { surpriseBtn.style.transform = ''; }, 150);

            // Aktiviteleri ve rotayı güncelle
            aktiviteleriGuncelle();
            rotaGuncelle();

            // Tarihe özel küçük bir mesaj (isteğe bağlı konsola)
            console.log(`📅 ${secilenTarih} için harika aktiviteler hazır!`);
        }

        // Başlangıçta rastgele doldur
        aktiviteleriGuncelle();
        rotaGuncelle();

        // Buton tıklama olayı
        surpriseBtn.addEventListener('click', surprizYap);

        // Tarih değiştiğinde de otomatik tetiklenebilir (opsiyonel, isteğe bağlı)
        tarihInput.addEventListener('change', () => {
            // Sadece tarih seçince de yenilensin isterseniz aktif edin:
            // surprizYap();
        });

        // Uçuşan kalpler oluştur (arka plan)
        function createFloatingHearts() {
            const container = document.getElementById('heartsContainer');
            const heartIcons = ['❤️', '💕', '💖', '💗', '💘', '💝', '♥️'];
            for (let i = 0; i < 22; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart-float';
                heart.textContent = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 9 + 's';
                heart.style.fontSize = (Math.random() * 20 + 16) + 'px';
                container.appendChild(heart);
            }
        }
        createFloatingHearts();

        // Youtube iframe düzgün yükleme (zaten var)
    })();
</script>
</body>
</html>
