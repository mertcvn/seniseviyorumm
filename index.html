<!DOCTYPE html>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#2a0000,#000);

overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
z-index:9999;
}

input,button{
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(135deg,#ff2e63,#ff7aa2);
color:white;
cursor:pointer;
}

/* APP */
.container{
display:flex;
height:100vh;
}

.left{
flex:2;
padding:20px;
}

.right{
flex:1;
background:rgba(255,255,255,0.05);
padding:15px;
overflow-y:auto;
}

.card{
background:rgba(255,255,255,0.06);
padding:12px;
margin-top:10px;
border-radius:10px;
}

<!-- LOGIN -->
<div id="login">
<h1>💖 Giriş Yap</h1>

<input id="pass" type="password" placeholder="kullanıcı:şifre">
<button onclick="login()">Giriş</button>

<p id="err" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<!-- LEFT -->
<div class="left">

<h1>💖 Seni Seviyorum</h1>

<input id="date" type="date">

<button onclick="surprise()">💌 Sürpriz Gün</button>

<div id="out" class="card"></div>

</div>

<!-- RIGHT -->

<h2>📅 Anılar</h2>
<div id="log"></div>

<div id="mapBox" class="card"></div>

/* ================= USER LOGIN SYSTEM ================= */
const USERS = {
"mertcan": "askim123",
"mercan": "askim123"
};

function login(){

let input = document.getElementById("pass").value;

/* format kontrol */
let parts = input.split(":");

if(parts.length !== 2){
document.getElementById("err").innerText = "❌ format: kullanıcı:şifre";
return;
}

let user = parts[0];
let pass = parts[1];

if(USERS[user] && USERS[user] === pass){
document.getElementById("login").style.display = "none";
document.getElementById("app").style.display = "flex";
}else{
document.getElementById("err").innerText = "❌ yanlış kullanıcı veya şifre";
}

}

/* ================= DATA ================= */
let data=[];

/* ================= SURPRISE ================= */
function surprise(){

let date=document.getElementById("date").value;
if(!date) return;

/* 🎯 ETKİNLİK */
let act = activities[Math.floor(Math.random()*activities.length)];

/* 🗺 ROTA */
let r1 = places[Math.floor(Math.random()*places.length)];
let r2 = places[Math.floor(Math.random()*places.length)];
let r3 = places[Math.floor(Math.random()*places.length)];

data.push({date,act,r1,r2,r3});

/* OUTPUT */
document.getElementById("out").innerHTML=
`
💖 ${date}<br><br>
🎯 Etkinlik:<br>${act}<br><br>
🗺 Rota:<br>${r1} → ${r2} → ${r3}
`;

document.getElementById("mapBox").innerHTML=
`${r1} → ${r2} → ${r3}`;

render();
}

/* ================= LOVE WORD ================= */
function loveWord(){
let w = words[Math.floor(Math.random()*words.length)];

}

/* ================= LOG ================= */
function render(){
let log=document.getElementById("log");
log.innerHTML="";

data.slice().reverse().forEach(i=>{
log.innerHTML+=`
<div class="card">
📅 ${i.date}<br><br>
🎯 ${i.act}<br><br>
🗺 ${i.r1} → ${i.r2} → ${i.r3}
</div>`;
});
