<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Final Love Engine 💖</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#300000,#000);
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.left{
flex:2;
padding:20px;
}

.right{
flex:1;
background:rgba(0,0,0,0.6);
padding:15px;
overflow-y:auto;
border-left:2px solid #ff2e63;
backdrop-filter: blur(12px);
}

h1{
color:#ff2e63;
text-shadow:0 0 25px #ff2e63;
}

input,button{
padding:10px;
border:none;
border-radius:10px;
margin-top:8px;
}

button{
background:#ff2e63;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff2e63;
transition:0.3s;
}

button:hover{transform:scale(1.05);}

.card{
background:rgba(255,255,255,0.06);
padding:12px;
margin-top:10px;
border-radius:15px;
box-shadow:0 0 15px rgba(255,0,100,0.25);
}

.heart{
position:absolute;
color:#ff2e63;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.modal-content{
background:#1a0000;
padding:25px;
border-radius:15px;
border:1px solid #ff2e63;
text-align:center;
}

.bar{
width:100%;
height:14px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:60%;
background:linear-gradient(90deg,#ff2e63,#ff7aa2);
transition:0.5s;
}

small{
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<h1>💖 Final Love Engine</h1>
<small>AI-powered romantic experience simulator</small>

<br><br>

<input id="date" type="date">
<input id="name1" placeholder="Senin adın">
<input id="name2" placeholder="Onun adı">

<br>

<button ondblclick="generate()">💌 Surprise Date Generate</button>
<button onclick="toggleMusic()">🎵 Music</button>
<button onclick="generateStory()">📖 Love Story</button>
<button onclick="resetAll()">🧹 Reset</button>

<div class="card" id="output"></div>

<div class="bar">
<div class="fill" id="bar"></div>
</div>

<!-- YT -->
<iframe id="yt" width="0" height="0"
src="https://www.youtube.com/embed/kJQP7kiw5Fk?autoplay=1"
allow="autoplay"></iframe>

</div>

<div class="right">

<h2>📅 Memory Log</h2>
<div id="log"></div>

<h2>🗺 Istanbul Romantic Route</h2>
<div class="card">
Galata → Karaköy → Ortaköy sahil → Üsküdar gün batımı 🌅
</div>

<h2>💌 Today Message</h2>
<div class="card" id="msg"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h2>💖 Surprise Unlocked</h2>
<p id="modalText"></p>
<button onclick="closeModal()">OK 💕</button>
</div>
</div>

<script>

/* ===== 300 ACTIVITIES ===== */
const base = [
"🌅 sunrise walk","🌌 stargazing","☕ coffee hopping","🍝 romantic dinner",
"🎬 movie night","🚲 bike ride","🧺 picnic","🎤 karaoke","🎮 game night",
"📸 photo walk","💌 letter writing","🏖 seaside walk","🔥 fire chat"
];

const activities = [];
while(activities.length < 300){
activities.push(base[Math.floor(Math.random()*base.length)] + " 💖✨");
}

/* STORAGE */
let data = JSON.parse(localStorage.getItem("finalLove") || "[]");

/* RELATIONSHIP ENGINE */
let level = 65;

/* MESSAGES */
const msgs = [
"Kalpler aynı frekansta 💖",
"Bugün bile birlikte olmasanız da hissediliyor 🌹",
"Bir bakış her şeyi anlatır ✨",
"Sonsuz bir an gibi..."
];

/* GENERATE DATE */
function generate(){

let date = document.getElementById("date").value;
if(!date) return alert("Pick a date 💕");

let a1 = pick();
let a2 = pick();

let entry = {
date,
a1,
a2,
mood:Math.floor(Math.random()*100)
};

data.push(entry);
save();

document.getElementById("output").innerHTML =
`<b>${date}</b><br>${a1}<br>${a2}`;

updateBar(entry.mood);
openModal(a1,a2);
}

/* PICK */
function pick(){
return activities[Math.floor(Math.random()*activities.length)];
}

/* SAVE */
function save(){
localStorage.setItem("finalLove",JSON.stringify(data));
render();
}

/* RENDER */
function render(){
let log=document.getElementById("log");
log.innerHTML="";

data.slice().reverse().forEach(d=>{
log.innerHTML+=`
<div class="card">
<b>${d.date}</b><br>
${d.a1}<br>${d.a2}<br>
Mood: ${d.mood}/100
</div>`;
});
}

/* BAR */
function updateBar(val){
document.getElementById("bar").style.width = val + "%";
}

/* STORY ENGINE */
function generateStory(){
let story = `
Bir ${pick()} sırasında,
${document.getElementById("name1").value || "Sen"} ve
${document.getElementById("name2").value || "O"},
zamandan bağımsız bir an yaşadı 💖
`;

document.getElementById("output").innerHTML = story;
}

/* MUSIC */
let play=true;
function toggleMusic(){
let yt=document.getElementById("yt");
yt.src = play ? "" : "https://www.youtube.com/embed/kJQP7kiw5Fk?autoplay=1";
play=!play;
}

/* MODAL */
function openModal(a1,a2){
document.getElementById("modalText").innerHTML = a1+"<br><br>"+a2;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* RESET */
function resetAll(){
data=[];
save();
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);

/* INIT */
render();
document.getElementById("msg").innerHTML =
msgs[Math.floor(Math.random()*msgs.length)];

</script>

</body>
</html>
