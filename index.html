<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveOS ❤️</title>

<style>
:root{
    --bg:#0a0000;
    --card:rgba(255,0,0,0.08);
    --red:#ff2b2b;
}

body{
    margin:0;
    font-family: system-ui, Arial;
    background: radial-gradient(circle at top, #2a0000, var(--bg));
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(255,0,0,0.3);
}

nav h1{
    color:var(--red);
    text-shadow:0 0 10px red;
}

/* LAYOUT */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    border:1px solid rgba(255,0,0,0.2);
    padding:20px;
    margin:15px 0;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,0,0,0.3);
    backdrop-filter: blur(6px);
}

/* INPUT */
input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin:5px;
    width:200px;
}

/* BUTTON */
button{
    padding:10px 14px;
    background:linear-gradient(45deg,#ff0033,#990000);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 10px red;
}

button:hover{
    transform:scale(1.05);
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h2{
    color:var(--red);
    text-shadow:0 0 10px red;
}

/* HIDDEN */
.hidden{display:none}

/* RESULT */
.result{
    line-height:1.6;
    font-size:16px;
}

/* CHAT */
#chat div{
    background:rgba(255,0,0,0.1);
    margin:5px 0;
    padding:8px;
    border-radius:10px;
}
</style>
</head>

<body>

<nav>
    <h1>❤️ LoveOS</h1>
    <div>Private Couple System</div>
</nav>

<div class="container">

<!-- LOGIN -->
<div id="login" class="hero">
    <h2>Bizim Gizli Evren</h2>

    <div class="card">
        <input id="u1" placeholder="Senin adın">
        <input id="u2" placeholder="Sevgilinin adı">
        <input id="pass" type="password" placeholder="Şifre">
        <br>
        <button onclick="login()">Giriş Yap</button>
    </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <!-- DATE PLAN -->
    <div class="card">
        <h3>📅 Buluşma Planı Oluştur</h3>
        <input type="date" id="date">
        <button onclick="generatePlan()">Plan Oluştur</button>

        <div id="plan" class="result"></div>
    </div>

    <!-- MUSIC -->
    <div class="card">
        <h3>🎵 Müzik</h3>

        <iframe id="yt"
        width="100%" height="220"
        src="https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1&mute=1"
        allowfullscreen></iframe>

        <button onclick="toggleMusic()">🔊 Ses</button>
    </div>

    <!-- CHAT -->
    <div class="card">
        <h3>💬 Gizli Mesaj</h3>
        <input id="msg" placeholder="Mesaj yaz...">
        <button onclick="send()">Gönder</button>
        <div id="chat"></div>
    </div>

</div>

</div>

<script>

/* LOGIN */
function login(){
    let u1=document.getElementById("u1").value;
    let u2=document.getElementById("u2").value;
    let pass=document.getElementById("pass").value;

    if(pass==="ask123"){
        localStorage.setItem("u1",u1);
        localStorage.setItem("u2",u2);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
    }
}

/* MUSIC */
let muted=true;

function toggleMusic(){
    let yt=document.getElementById("yt");
    muted=!muted;

    yt.src=
    "https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1&mute="+(muted?1:0);
}

/* REAL ROMANTIC ENGINE */
function generatePlan(){

    let date=new Date(document.getElementById("date").value);
    if(!date) return;

    let day=date.getDay(); // 0-6

    const plans=[
        {
            r:"Gün batımında sahilde birlikte sessiz bir yürüyüş yapın ve sadece anın tadını çıkarın.",
            f:"Birlikte sokak yemekleri deneyip mini bir ‘food challenge’ yapın.",
            m:"O gün birbirinize küçük bir mektup yazıp saklayın."
        },
        {
            r:"Şehir ışıkları altında bir kafede uzun uzun sohbet edin.",
            f:"Rastgele bir oyun oynayıp kaybeden küçük bir ceza yapsın.",
            m:"İkiniz için anlamlı bir fotoğraf çekin ve arşivleyin."
        },
        {
            r:"Birlikte gün doğumunu izleyip geleceğiniz hakkında hayal kurun.",
            f:"Evde film gecesi yapın ve abur cubur yarışması yapın.",
            m:"O günü temsil eden bir şarkı seçip 'bizim şarkımız' yapın."
        }
    ];

    let p=plans[day%3];

    document.getElementById("plan").innerHTML=
    "❤️ Romantik Plan:<br>"+p.r+
    "<br><br>🎮 Eğlenceli Plan:<br>"+p.f+
    "<br><br>📸 Anı Planı:<br>"+p.m;
}

/* CHAT */
function send(){
    let msg=document.getElementById("msg").value;

    let div=document.createElement("div");
    div.innerText="💌 "+msg;

    document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
