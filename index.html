<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>❤️ Bizim Aşk Evrenimiz</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#2a0000,#000);
    color:white;
    overflow-x:hidden;
}

/* GLASS UI */
.box{
    background:rgba(255,0,0,0.08);
    margin:15px auto;
    width:85%;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 20px red;
    backdrop-filter: blur(6px);
}

.glow{
    color:#ff2b2b;
    text-shadow:0 0 10px red,0 0 20px red;
}

input,button{
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
}

button{
    background:#ff0033;
    color:white;
    cursor:pointer;
    box-shadow:0 0 10px red;
}

/* HEART */
.heart{
    position:absolute;
    width:14px;
    height:14px;
    background:red;
    transform:rotate(45deg);
    animation:float 6s linear infinite;
}
.heart:before,.heart:after{
    content:'';
    position:absolute;
    width:14px;height:14px;
    background:red;
    border-radius:50%;
}
.heart:before{top:-7px;}
.heart:after{left:-7px;}

@keyframes float{
    0%{transform:translateY(100vh) rotate(45deg);}
    100%{transform:translateY(-10vh) rotate(45deg);}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
}
.modal-content{
    background:#200;
    margin:15% auto;
    padding:20px;
    width:70%;
    border-radius:15px;
}

/* GALLERY */
img{
    width:120px;
    margin:5px;
    border-radius:10px;
}

/* GAME */
.circle{
    width:30px;
    height:30px;
    background:red;
    border-radius:50%;
    position:absolute;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
    <h1 class="glow">❤️ Aşk Girişi</h1>
    <input id="u1" placeholder="Sen">
    <input id="u2" placeholder="O">
    <input id="pass" type="password" placeholder="Şifre">
    <button onclick="login()">Giriş</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1 class="glow" id="title"></h1>

<!-- COUNTDOWN -->
<div class="box">
<h3>⏳ Buluşma Sayacı</h3>
<input type="date" id="date">
<button onclick="countdown()">Başlat</button>
<p id="time"></p>
</div>

<!-- MUSIC -->
<div class="box">
<h3>🎵 Müzik</h3>
<input id="yt">
<button onclick="addMusic()">Ekle</button>
<div class="box">
  <h3>🎵 Aşk Playlist</h3>

  <iframe id="ytFrame"
    width="320" height="200"
    src="https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1&mute=1"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <br>

  <button onclick="muteToggle()">🔊 Ses Aç / Kapat</button>
  <button onclick="nextSong()">⏭ Sonraki</button>
  <button onclick="restart()">🔁 Baştan Başlat</button>
</div>

<script>
let isMuted = true;

function muteToggle(){
    let frame = document.getElementById("ytFrame");

    if(isMuted){
        frame.src = frame.src.replace("mute=1","mute=0");
        isMuted = false;
    } else {
        frame.src = frame.src.replace("mute=0","mute=1");
        isMuted = true;
    }
}

function nextSong(){
    let frame = document.getElementById("ytFrame");

    frame.src =
    "https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1&mute=" + (isMuted ? "1" : "0");
}

function restart(){
    let frame = document.getElementById("ytFrame");

    frame.src =
    "https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1&mute=1";

    isMuted = true;
}
</script>
</div>

<!-- SURPRISE -->
<div class="box">
<h3>🎁 Sürpriz</h3>
<button onclick="surprise()">Aç</button>
<p id="s"></p>
</div>

<!-- CHAT -->
<div class="box">
<h3>💬 Gizli Chat</h3>
<input id="msg">
<button onclick="send()">Gönder</button>
<div id="chat"></div>
</div>

<!-- ALBUM -->
<div class="box">
<h3>📸 Anı Albümü</h3>
<input type="file" onchange="addPhoto(event)">
<div id="gallery"></div>
</div>

<!-- GAME -->
<div class="box">
<h3>🎮 Kalp Yakala</h3>
<button onclick="startGame()">Başlat</button>
<p>Puan: <span id="score">0</span></p>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h2>❤️ Sürpriz</h2>
<p id="mtext"></p>
<button onclick="closeM()">Kapat</button>
</div>
</div>

<script>

/* DATA */
const romantic=[], fun=[], memory=[];
for(let i=1;i<=300;i++){
 romantic.push("Romantik an "+i);
 fun.push("Eğlence "+i);
 memory.push("Hatıra "+i);
}

/* LOGIN */
function login(){
let u1=u("u1"), u2=u("u2"), p=u("pass");

if(p==="ask123"){
localStorage.setItem("u1",u1);
localStorage.setItem("u2",u2);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("title").innerText=
"❤️ "+u1+" & "+u2+" Evreni";
}
}

/* helpers */
function u(id){return document.getElementById(id).value}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);

/* COUNTDOWN */
function countdown(){
let d=new Date(document.getElementById("date").value);
setInterval(()=>{
let diff=d-new Date();
if(diff<=0){document.getElementById("time").innerText="❤️ BULUŞMA ZAMANI";return;}
let x=Math.floor(diff/86400000);
document.getElementById("time").innerText=x+" gün kaldı ❤️";
},1000);
}

/* MUSIC */
function addMusic(){
let url=u("yt");
let id=url.split("v=")[1]||url.split("/").pop();
let div=document.createElement("div");
div.innerHTML=`<iframe width="200" height="120"
src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
document.getElementById("music").appendChild(div);
}

/* SURPRISE */
function surprise(){
let i=Math.floor(Math.random()*300);
let text=
"❤️ "+romantic[i]+"<br>"+
"🎮 "+fun[i]+"<br>"+
"📸 "+memory[i];

document.getElementById("mtext").innerHTML=text;
document.getElementById("modal").style.display="block";
document.getElementById("s").innerHTML=text;
}

/* CHAT */
function send(){
let msg=u("msg");
let div=document.createElement("div");
div.innerText="💌 "+msg;
document.getElementById("chat").appendChild(div);
}

/* ALBUM */
function addPhoto(e){
let file=e.target.files[0];
let r=new FileReader();
r.onload=function(){
let img=document.createElement("img");
img.src=r.result;
document.getElementById("gallery").appendChild(img);
}
r.readAsDataURL(file);
}

/* GAME */
let score=0;
function startGame(){
let c=document.createElement("div");
c.className="circle";
c.style.top=Math.random()*80+"vh";
c.style.left=Math.random()*80+"vw";
document.body.appendChild(c);

c.onclick=()=>{
score++;
document.getElementById("score").innerText=score;
c.remove();
}
setTimeout(startGame,1000);
}

/* MODAL */
function closeM(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
