<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>💖 Ultra Love Engine FINAL</title>

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#2a0000,#000);
color:white;
overflow:hidden;
}

/* glow background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,46,99,0.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,120,160,0.15), transparent 40%);
pointer-events:none;
animation:bg 10s infinite alternate;
}

@keyframes bg{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* ================= LAYOUT ================= */
.container{
display:flex;
height:100vh;
}

.left{
flex:2;
padding:25px;
}

.right{
flex:1;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:15px;
overflow-y:auto;
}

/* ================= UI ================= */
input,button{
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

input{
width:100%;
background:rgba(255,255,255,0.08);
color:white;
}

button{
background:linear-gradient(135deg,#ff2e63,#ff7aa2);
color:white;
cursor:pointer;
margin-right:5px;
}

button:hover{
transform:scale(1.05);
}

/* ================= CARD ================= */
.card{
background:rgba(255,255,255,0.06);
padding:12px;
margin-top:10px;
border-radius:12px;
}

/* ================= HEART ================= */
.heart{
position:absolute;
color:#ff2e63;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}

/* ================= PHOTO ================= */
#photo{
width:100%;
max-width:250px;
margin-top:10px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">

<h1>💖 LOVE ENGINE FINAL</h1>

<input id="date" type="date">
<input id="n1" placeholder="Senin adın">
<input id="n2" placeholder="Onun adı">

<button onclick="surprise()">💌 Sürpriz Gün</button>
<button onclick="mapMode()">🗺 MAP MODE</button>
<button onclick="aiMode()">🧠 AI MODE</button>

<input type="file" onchange="loadPhoto(event)">
<img id="photo">

<div class="card" id="out">Hazır 💖</div>

</div>

<!-- RIGHT -->
<div class="right">

<h2>📅 Anılar</h2>
<div id="log"></div>

<h2>🗺 Rota</h2>
<div class="card" id="mapBox"></div>

<h2>🎵 Music</h2>
<iframe width="100%" height="150"
src="https://www.youtube.com/embed/videoseries?list=PLbIn9TEuFDLrl-vt1zL1pd0MUipFgfiHc&autoplay=1"
allow="autoplay"></iframe>

</div>

</div>

<script>

/* ================= 300 ACTIVITIES ================= */
const baseActs = [
"Galata yürüyüşü","Moda sahil","Karaköy kahve","Kız Kulesi",
"Bebek sahili","Ortaköy gece","Emirgan piknik","Balat turu",
"Şile kaçamağı","Ağva gün batımı","Beykoz orman","Kuzguncuk sokakları"
];

let acts=[];
while(acts.length<300){
acts.push(baseActs[Math.floor(Math.random()*baseActs.length)]);
}

/* ================= DATA ================= */
let data=[];

/* ================= SURPRISE ================= */
function surprise(){

let d=document.getElementById("date").value;
if(!d)return;

let a1=acts[Math.floor(Math.random()*acts.length)];
let a2=acts[Math.floor(Math.random()*acts.length)];

data.push({d,a1,a2});

document.getElementById("out").innerHTML=
`💖 ${d}<br>${a1}<br>${a2}`;

render();
}

/* ================= MAP ================= */
const places=[
"Galata","Kadıköy","Üsküdar","Ortaköy","Bebek",
"Balat","Taksim","Beşiktaş","Emirgan","Beykoz",
"Şile","Ağva","Moda","Kuzguncuk","Çengelköy"
];

function mapMode(){

let a=places[Math.floor(Math.random()*places.length)];
let b=places[Math.floor(Math.random()*places.length)];
let c=places[Math.floor(Math.random()*places.length)];

document.getElementById("mapBox").innerHTML=
`${a} → ${b} → ${c}`;
}

/* ================= AI ================= */
function aiMode(){
let r=Math.random();
let a=acts[Math.floor(Math.random()*acts.length)];

if(r<0.33){
out("💖 Romantik: "+a);
}else if(r<0.66){
out("🔥 Eğlenceli: "+a);
}else{
out("🌿 Sakin: ev + film + huzur");
}
}

function out(t){
document.getElementById("out").innerHTML=t;
}

/* ================= LOG ================= */
function render(){
let log=document.getElementById("log");
log.innerHTML="";
data.slice().reverse().forEach(i=>{
log.innerHTML+=`<div class="card">${i.d}<br>${i.a1}<br>${i.a2}</div>`;
});
}

/* ================= PHOTO ================= */
function loadPhoto(e){
let r=new FileReader();
r.onload=function(){
let img=document.getElementById("photo");
img.src=r.result;
img.style.display="block";
};
r.readAsDataURL(e.target.files[0]);
}

/* ================= HEARTS ================= */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);

</script>

</body>
</html>
